      - name: 对规则进行排序、去重与优化
        shell: bash
        working-directory: ${{ github.workspace }}/Tools-repo
        run: |
          set -euo pipefail
          shopt -s globstar
          echo "开始排序与去重 & 修正规则格式"

          for file in Ruleset/Surge/**/*.list \
                      Ruleset/mihomo/Block/*.list \
                      Surge/Module/Ads_Block.sgmodule; do
            [[ -f "$file" ]] || continue

            # 删除无效规则
            sed -i '/^DOMAIN-REGEX,/d' "$file"

            # 清理注释、空行、行内注释及指定内容
            sed -i -E '/^\s*[#;]/d; /^\s*\/\//d; /^$/d; s| //.*||' "$file"
            sed -i -e '/DOMAIN,this_ruleset_is_made_by_sukkaw.ruleset.skk.moe/d' "$file"
            sed -i -E 's/,reject(,[^,]+)*$//I' "$file"
            sed -i 's/, */,/g' "$file"

            # 按规则类型排序
            awk '
              /^DOMAIN,/ { print "0 " $0; next }
              /^DOMAIN-SUFFIX,/ { print "1 " $0; next }
              /^DOMAIN-KEYWORD,/ { print "2 " $0; next }
              /^DOMAIN-WILDCARD,/ { print "3 " $0; next }
              /^IP-CIDR,/ { print "4 " $0; next }
              /^IP-CIDR6,/ { print "5 " $0; next }
              /^IP-ASN,/ { print "6 " $0; next }
              /^PROCESS-NAME,/ { print "7 " $0; next }
              /^URL-REGEX,/ { print "8 " $0; next }
              /^USER-AGENT,/ { print "9 " $0; next }
              /^GEOIP,/ { print "10 " $0; next }
              /^AND,/ { print "11 " $0; next }
              /^OR,/ { print "12 " $0; next }
              /^NOT,/ { print "13 " $0; next }
              /^DEST-PORT,/ { print "14 " $0; next }
              { print "15 " $0; next }
            ' "$file" | sort -k1,1n -k2,2 | cut -d' ' -f2- > "$file.sorted" && mv "$file.sorted" "$file"

            # 去重（忽略大小写）
            awk '!seen[tolower($0)]++' "$file" > temp && mv temp "$file"
          done

          # 处理 Surge 规则文件头部信息
          file_names=$(basename "$file" .list)
          line_count=$(wc -l < "$file")
          awk -v fname="$file_names" 'NR==1 {print "# 规则名称: " fname} {print}' "$file" > tmp && mv tmp "$file"
          awk -v count="$line_count" 'NR==2 {print "# 规则统计: " count} {print}' "$file" > tmp && mv tmp "$file"
          sed -i '2a\\' "$file"

      - name: 处理 Surge 广告模块 sgmodule
        shell: bash
        working-directory: ${{ github.workspace }}/Tools-repo
        run: |
          set -euo pipefail
          for file in Surge/Module/Ads_Block.sgmodule; do
            [[ -f "$file" ]] || continue
            line_count=$(wc -l < "$file")
            {
              echo "#!name = Block ads | 自用广告拦截合集规则"
              echo "#!desc = 名称: 自用广告拦截合集规则"
              echo "#!author = RuCu6 Keywos fmz200 可莉🅥 QingRex"
              echo "#!category = 🚫 Block ads"
              echo "#!tag = 自用广告拦截合集规则"
              echo "#!Rule = $line_count"
              echo ""
              echo "[Rule]"
              awk -F, '{
                if ($0 ~ /^AND,\(\(IP-CIDR,/ || $0 ~ /^AND,\(\(IP-CIDR6,/) { print $0; next }
                sub(/,no-resolve/, "", $0)
                rule = $1
                if (rule=="DOMAIN-KEYWORD" || rule=="DOMAIN-SUFFIX" || rule=="DOMAIN") {
                  print $0",REJECT,extended-matching,pre-matching"
                } else if (rule=="URL-REGEX" || rule=="USER-AGENT") {
                  print $0",REJECT,extended-matching"
                } else if (rule=="AND") {
                  print $0",REJECT,pre-matching"
                } else if (rule=="IP-CIDR" || rule=="IP-CIDR6") {
                  print $0",REJECT,no-resolve,pre-matching"
                } else {
                  print $0
                }
              }' "$file"
            } > tmpfile && mv tmpfile "$file"
          done

      - name: 同步 LoonKissSurge 模块到 Surge/QingRex
        run: |
          REPO_DIR="${{ github.workspace }}/LoonKissSurge"
          rm -rf "$REPO_DIR"
          git clone --depth=1 --single-branch "https://github.com/QingRex/LoonKissSurge.git" "$REPO_DIR"
          TARGET_DIR="${{ github.workspace }}/Tools-repo/Surge/QingRex"
          rm -rf "$TARGET_DIR" && mkdir -p "$TARGET_DIR"
          cp -r "$REPO_DIR/Surge/." "$TARGET_DIR/"
          echo "已同步 LoonKissSurge 模块到 Surge/QingRex"

      - name: 提交并推送更新
        shell: bash
        working-directory: ${{ github.workspace }}/Tools-repo
        run: |
          set -euo pipefail

          # 默认无更新
          echo "changed=false" >> $GITHUB_ENV

          git pull --rebase --autostash origin main

          git add -A

          if ! git diff --cached --quiet; then
            echo "检测到规则文件更新，开始提交"

            # 标记有更新
            echo "changed=true" >> $GITHUB_ENV

            # 统计变更类型
            added=$(git diff --cached --name-status | grep '^A' | wc -l || true)
            modified=$(git diff --cached --name-status | grep '^M' | wc -l || true)
            deleted=$(git diff --cached --name-status | grep '^D' | wc -l || true)

            echo "added=$added" >> $GITHUB_ENV
            echo "modified=$modified" >> $GITHUB_ENV
            echo "deleted=$deleted" >> $GITHUB_ENV

            # 获取文件列表
            files=$(git diff --cached --name-only | head -n 10 | sed 's/^/- /')
            echo "files<<EOF" >> $GITHUB_ENV
            echo "$files" >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV

            git config --local user.name "GitHub Actions"
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
      
            git commit -m "Auto Update Ruleset $(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S %Z')"
      
            if git push origin main; then
              echo "规则同步并推送成功！"
            else
              echo "推送失败，请检查仓库权限。"
              exit 1
            fi
          else
            echo "规则文件无变更，无需提交。"
          fi

      - name: 设置当前时间变量
        shell: bash
        run: |
          echo "time=$(date +'%Y-%m-%d %H:%M:%S %Z')" >> $GITHUB_ENV

      - name: 发送 Telegram 通知
        uses: appleboy/telegram-action@master
        if: always()
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            📢 GitHub Actions 自动化任务通知
            ✉️ 标题: Surge 上游规则模块拉取
            📦 仓库: thNylHx/Tools
            ⏰ 时间: ${{ env.time }}
            🎯 状态: ${{ job.status == 'success' && '恭喜你! 任务成功' || '很遗憾! 任务失败' }}
            📊 更新: ${{ env.changed == 'true' && '本次有更新' || '本次无更新' }}

            ${{ env.changed == 'true' && format('📈 变更统计\n  ➕ 新增: {0}\n  ✏️ 修改: {1}\n  ❌ 删除: {2}', env.added, env.modified, env.deleted) || '' }}

            ${{ env.changed == 'true' && format('📂 *变更文件*\n{0}', env.files) || '' }}

      - name: 清理旧工作流运行记录
        uses: Mattraks/delete-workflow-runs@main
        with:
          retain_days: 5               # 保留最近 5 天記錄
          keep_minimum_runs: 3         # 至少保留 3 次運行
